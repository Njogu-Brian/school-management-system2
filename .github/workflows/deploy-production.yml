name: Deploy Production

# Auto-deploy to erp.royalkingsschools.sc.ke when main is updated.
# Setup: docs/AUTO_DEPLOY.md

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Verify deploy secrets exist
        run: |
          missing=0
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then echo "::error::Missing secret DEPLOY_HOST (use 13.245.211.78)"; missing=1; fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then echo "::error::Missing secret DEPLOY_USER (use ubuntu)"; missing=1; fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then echo "::error::Missing secret DEPLOY_SSH_KEY (full erp-key.pem)"; missing=1; fi
          exit $missing

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          fingerprint: SHA256:COLj0Y7VlN8EeKA4vt89WnH4E+3hPnnad+P+pZXiqeA
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/erp
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy-production.sh
